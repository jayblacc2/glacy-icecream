<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browse our complete ice cream catalog - Glacy Ice Cream Shop"
    />

    <link
      rel="shortcut icon"
      href="../images/icons/favicon.png"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Slab:wght@400;500;700&family=Yanone+Kaffeesatz:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/catalogs.css" />

    <title>Glacy-Store | Ice Cream Catalog</title>
  </head>

  <body>
    <a href="../index.html" class="back-home">
      <i class="fa-solid fa-arrow-left"></i>
      Back to Home
    </a>
    <div class="catalog-page">
      <div class="catalog-header">
        <h1>Our Ice Cream Collection</h1>
        <p>
          Explore our delicious range of premium ice cream flavors, crafted with
          love and the finest ingredients
        </p>
      </div>

      <!-- Filter Section -->
      <div class="filter-section">
        <button class="filter-btn active" data-category="all">
          All Flavors
        </button>
        <button class="filter-btn" data-category="Fruit">Fruit</button>
        <button class="filter-btn" data-category="Nut">Nut</button>
        <button class="filter-btn" data-category="Chocolate">Chocolate</button>
        <button class="filter-btn" data-category="Classic">Classic</button>
        <button class="filter-btn" data-category="Candy">Candy</button>
        <button class="filter-btn" data-category="Mint">Mint</button>
        <button class="filter-btn" data-category="Caramel">Caramel</button>
      </div>

      <!-- Ice Cream Grid -->
      <div class="catalog-grid" id="catalog-grid">
        <!-- Ice cream cards will be dynamically loaded here -->
      </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-content">
        <button class="modal-close" id="modal-close">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="modal-body" id="modal-body">
          <!-- Modal content will be dynamically loaded here -->
        </div>
      </div>
    </div>

    <script type="module" src="../script/catalog.js"></script>
  </body>
</html>
